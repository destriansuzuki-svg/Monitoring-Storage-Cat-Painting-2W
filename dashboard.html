<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inventory Gudang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#f8fafc] text-slate-800">

<div class="flex min-h-screen">
    <aside class="w-56 bg-[#0f172a] text-slate-400 fixed inset-y-0 left-0 p-5">
        <h2 class="text-white font-bold text-lg mb-8 uppercase tracking-widest">Inventory</h2>
        <nav class="space-y-4">
            <button class="w-full text-left text-white bg-blue-600 p-2 rounded">Dashboard</button>
        </nav>
    </aside>

    <main class="flex-1 ml-56 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Dashboard Monitoring</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded border shadow-sm">
                <p class="text-xs uppercase text-slate-400 font-bold">Total Stok</p>
                <h2 class="text-3xl font-bold mt-2">1,240 <span class="text-sm font-normal text-slate-500">Unit</span></h2>
            </div>
            <div class="bg-white p-6 rounded border shadow-sm border-l-4 border-l-red-500">
                <p class="text-xs uppercase text-red-500 font-bold">Mendekati Expired</p>
                <h2 class="text-3xl font-bold mt-2 text-red-600">12 <span class="text-sm font-normal text-slate-500">Item</span></h2>
            </div>
            <div class="bg-white p-6 rounded border shadow-sm">
                <p class="text-xs uppercase text-slate-400 font-bold">Terakhir Diambil</p>
                <h2 class="text-lg font-semibold mt-2">Cat Primer (10:30 WIB)</h2>
            </div>
        </div>

        <div class="space-y-8">
            <div class="bg-white p-6 rounded border shadow-sm">
                <h4 class="font-bold text-slate-700 mb-6 uppercase text-sm">Tren Pengambilan Harian</h4>
                <div class="h-[300px] w-full"><canvas id="dailyUsageChart"></canvas></div>
            </div>

            <div class="bg-white p-6 rounded border shadow-sm">
                <h4 class="font-bold text-slate-700 mb-6 uppercase text-sm">Perbandingan Stok vs Kapasitas Maksimal</h4>
                <div class="h-[350px] w-full"><canvas id="stockLevelChart"></canvas></div>
            </div>
        </div>
    </main>
</div>

<script>
    // Data terpusat
    const labels = ['Cat A', 'Chem B', 'Thinner', 'Solvent', 'Epoxy'];
    const currentStock = [80, 45, 90, 30, 60];
    const maxCapacity = [100, 100, 100, 50, 80];

    // Chart Inisialisasi
    new Chart(document.getElementById('dailyUsageChart'), {
        type: 'line',
        data: {
            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
            datasets: [{ label: 'Pengeluaran (Liter)', data: [12, 19, 3, 5, 2, 3, 7], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // Chart Stok vs Maks (Satu diagram batang)
    new Chart(document.getElementById('stockLevelChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Stok Saat Ini', data: currentStock, backgroundColor: '#3b82f6' },
                { label: 'Kapasitas Maksimal', data: maxCapacity, backgroundColor: '#e2e8f0' }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });

    lucide.createIcons();
</script>
</body>
</html>
