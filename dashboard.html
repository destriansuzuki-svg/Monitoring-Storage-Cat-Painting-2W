<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Inventory System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 flex">

    <div class="w-64 h-screen bg-slate-800 text-white flex flex-col fixed">
        <div class="p-6 text-2xl font-bold border-b border-slate-700">
            🎨 Inv-Gudang
        </div>
        
        <nav class="flex-grow p-4 space-y-2">
            <a href="#" class="block py-2.5 px-4 rounded bg-blue-600 hover:bg-blue-500 transition">Dashboard</a>
            <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Data Inventory</a>
            
            <div id="adminMenu" class="hidden pt-4 border-t border-slate-700">
                <p class="text-xs text-gray-400 mb-2 px-4 uppercase">Admin Area</p>
                <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Update Stock</a>
                <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Tambah Barang</a>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-700 text-sm">
            <p id="userRoleDisplay" class="mb-2 text-blue-300 font-semibold"></p>
            <button onclick="logout()" class="w-full bg-red-500 py-2 rounded hover:bg-red-600">Logout</button>
        </div>
    </div>

    <div class="ml-64 p-8 w-full">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Ringkasan Gudang Material</h1>
            <div id="statusBadge" class="px-4 py-1 rounded-full text-sm font-semibold"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Item</p>
                <p id="totalItem" class="text-3xl font-bold">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-yellow-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Stok Menipis</p>
                <p id="lowStock" class="text-3xl font-bold">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">Total Chemical</p>
                <p id="chemCount" class="text-3xl font-bold">--</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h3 class="font-bold mb-4">Stock Overview</h3>
            <p class="text-gray-400 italic">Data akan ditarik dari Google Spreadsheet...</p>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
