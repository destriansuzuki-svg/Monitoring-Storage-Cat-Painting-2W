<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventory Cat & Chemical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        section { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <div class="md:hidden bg-slate-900 text-white p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="package" class="w-5 h-5 text-blue-400"></i>
            <span class="font-bold text-xs tracking-tight uppercase">INV System</span>
        </div>
        <button id="mobileMenuBtn" class="p-1.5 hover:bg-slate-800 rounded">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 bg-[#0f172a] text-slate-400 transform -translate-x-full md:translate-x-0 transition-transform duration-200 flex flex-col border-r border-slate-800">
            <div class="p-5 border-b border-slate-800/50 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-1.5 rounded shadow-lg text-white">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-white text-sm uppercase">Warehouse</span>
                </div>
                <button class="md:hidden" id="closeSidebar"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <nav class="flex-grow p-3 space-y-0.5 overflow-y-auto no-scrollbar">
                <p class="px-3 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.15em]">Menu Utama</p>
                <button onclick="showSection('dashboard')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 text-white bg-blue-600 active-link">
                    <i data-lucide="pie-chart" class="w-4 h-4"></i> Dashboard
                </button>
                <button onclick="showSection('inventory')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 text-slate-400">
                    <i data-lucide="list-checks" class="w-4 h-4"></i> Histori Transaksi
                </button>
                <button onclick="showSection('stock')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 text-slate-400">
                    <i data-lucide="box-select" class="w-4 h-4"></i> Stock Material
                </button>
                
                <div class="pt-4 mt-2 border-t border-slate-800/50">
                    <p class="px-3 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.15em]">Master Data</p>
                    <button onclick="showSection('master')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 text-slate-400">
                        <i data-lucide="database" class="w-4 h-4"></i> Database
                    </button>
                    <button onclick="showSection('update')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 text-slate-400">
                        <i data-lucide="file-plus" class="w-4 h-4"></i> Input In/Out
                    </button>
                </div>
            </nav>
        </aside>

        <div class="flex-1 md:ml-56 transition-all duration-300">
            <main class="p-4 md:p-8 max-w-7xl mx-auto">
                <header class="flex justify-between items-center mb-8 pb-5 border-b border-slate-200">
                    <div>
                        <h1 id="sectionTitle" class="text-2xl font-bold text-slate-800 tracking-tight">Ringkasan Gudang</h1>
                    </div>
                </header>

                <section id="dashboard-section" class="animate-in fade-in">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-8">
                        <div class="bg-white p-5 rounded border shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Total SKU</p>
                            <h3 id="totalItem" class="text-2xl font-bold text-slate-800">--</h3>
                        </div>
                        <div class="bg-white p-5 rounded border shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Low Stock</p>
                            <h3 id="lowStock" class="text-2xl font-bold text-slate-800">--</h3>
                        </div>
                        <div class="bg-white p-5 rounded border shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Chemical</p>
                            <h3 id="chemCount" class="text-2xl font-bold text-slate-800">--</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-8">
                        <div class="bg-white p-5 rounded border shadow-sm">
                            <h4 class="font-bold text-[11px] text-slate-700 uppercase mb-4">Tren Pengambilan Harian</h4>
                            <div class="h-[250px]"><canvas id="dailyUsageChart"></canvas></div>
                        </div>
                        <div class="bg-white p-5 rounded border shadow-sm">
                            <h4 class="font-bold text-[11px] text-slate-700 uppercase mb-4">Stok vs Kapasitas Maks</h4>
                            <div class="h-[250px]"><canvas id="stockLevelChart"></canvas></div>
                        </div>
                    </div>
                </section>

                <section id="inventory-section" class="hidden"><div id="inventoryContainer"></div></section>
                <section id="stock-section" class="hidden"><div id="stockSummaryContainer"></div></section>
                <section id="master-section" class="hidden"><div id="masterContainer"></div></section>
                <section id="update-section" class="hidden"><div id="formPlaceholder"></div></section>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function initCharts() {
            new Chart(document.getElementById('dailyUsageChart'), {
                type: 'line',
                data: {
                    labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                    datasets: [{ label: 'Pengambilan', data: [10, 15, 8, 20, 5, 2, 7], borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            new Chart(document.getElementById('stockLevelChart'), {
                type: 'bar',
                data: {
                    labels: ['Cat A', 'Chem B', 'Thinner'],
                    datasets: [
                        { label: 'Stok', data: [60, 30, 80], backgroundColor: '#3b82f6' },
                        { label: 'Max', data: [100, 100, 100], backgroundColor: '#e2e8f0' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            // Logika navigasi lainnya...
        }

        window.onload = () => {
            initCharts();
        };
    </script>
</body>
</html>
