<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventory Cat & Chemical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js untuk grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        section { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <div class="md:hidden bg-slate-900 text-white p-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="package" class="w-5 h-5 text-blue-400"></i>
            <span class="font-bold text-xs tracking-tight uppercase">INV System</span>
        </div>
        <button id="mobileMenuBtn" class="p-1.5 hover:bg-slate-800 rounded">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 bg-[#0f172a] text-slate-400 transform -translate-x-full md:translate-x-0 transition-transform duration-200 flex flex-col border-r border-slate-800">
            <div class="p-5 border-b border-slate-800/50 flex justify-between items-center bg-[#0f172a]">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-1.5 rounded shadow-lg shadow-blue-500/20 text-white">
                        <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-white tracking-tight text-sm uppercase">Warehouse</span>
                </div>
                <button class="md:hidden text-slate-500" id="closeSidebar">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <nav class="flex-grow p-3 space-y-0.5 overflow-y-auto no-scrollbar">
                <p class="px-3 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.15em]">Menu Utama</p>
                <button onclick="showSection('dashboard')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 hover:text-white transition-all bg-blue-600 text-white active-link">
                    <i data-lucide="pie-chart" class="w-4 h-4"></i>
                    <span>Dashboard</span>
                </button>
                <button onclick="showSection('inventory')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 hover:text-white transition-all text-slate-400">
                    <i data-lucide="list-checks" class="w-4 h-4"></i>
                    <span>Histori Transaksi</span>
                </button>
                <button onclick="showSection('stock')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 hover:text-white transition-all text-slate-400">
                    <i data-lucide="box-select" class="w-4 h-4"></i>
                    <span>Stock Material</span>
                </button>
                
                <div id="adminMenu" class="pt-4 mt-2 border-t border-slate-800/50">
                    <p class="px-3 py-2 text-[9px] font-bold text-slate-500 uppercase tracking-[0.15em]">Master Data</p>
                    <button onclick="showSection('master')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 hover:text-white transition-all text-slate-400">
                        <i data-lucide="database" class="w-4 h-4"></i>
                        <span>Database Cat & Chem</span>
                    </button>
                    <button onclick="showSection('update')" class="nav-btn w-full flex items-center gap-2.5 py-2 px-3 rounded text-[12px] font-medium hover:bg-slate-800 hover:text-white transition-all text-slate-400">
                        <i data-lucide="file-plus" class="w-4 h-4"></i>
                        <span>Input In/Out</span>
                    </button>
                </div>
            </nav>

            <div class="p-3 border-t border-slate-800/50 bg-[#0b1120]">
                <div class="flex items-center gap-2.5 p-2 bg-slate-800/30 rounded border border-slate-700/30 mb-3">
                    <div class="w-8 h-8 rounded bg-blue-500 flex items-center justify-center font-bold text-xs text-white uppercase shadow-inner">
                        <i data-lucide="user-check" class="w-4 h-4"></i>
                    </div>
                    <div class="truncate">
                        <p id="userRoleDisplay" class="text-[11px] font-bold text-slate-200 truncate leading-tight uppercase">Admin Gudang</p>
                        <p class="text-[9px] text-green-400 font-bold flex items-center gap-1">
                            <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span> ONLINE
                        </p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 bg-slate-800/50 text-slate-400 py-2 rounded text-[11px] hover:bg-red-600 hover:text-white transition-all font-bold border border-slate-700/50">
                    <i data-lucide="power" class="w-3.5 h-3.5"></i> Keluar Sistem
                </button>
            </div>
        </aside>

        <div class="flex-1 md:ml-56 transition-all duration-300">
            <main class="p-4 md:p-8 max-w-7xl mx-auto">
                
                <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 border-b border-slate-200 pb-5">
                    <div>
                        <nav class="flex text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 gap-1.5">
                            <span>Warehouse</span>
                            <span>/</span>
                            <span class="text-blue-600" id="breadcrumb">Dashboard</span>
                        </nav>
                        <h1 id="sectionTitle" class="text-2xl font-bold text-slate-800 tracking-tight">Ringkasan Gudang</h1>
                    </div>
                    <div id="statusBadge" class="bg-white px-3 py-1.5 rounded border border-slate-200 shadow-sm text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                        SYNC STATUS: <span class="text-emerald-500">OK</span>
                    </div>
                </header>

                <!-- DASHBOARD SECTION -->
                <section id="dashboard-section" class="animate-in fade-in duration-300">
                    <!-- Stat Cards (tetap seperti sebelumnya) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">
                        <div class="bg-white p-5 rounded border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="p-3 bg-blue-50 text-blue-600 rounded">
                                <i data-lucide="boxes" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Total SKU</p>
                                <h3 id="totalItem" class="text-2xl font-bold text-slate-800 leading-none tracking-tight">--</h3>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="p-3 bg-amber-50 text-amber-600 rounded">
                                <i data-lucide="flame-kindling" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Low Stock</p>
                                <h3 id="lowStock" class="text-2xl font-bold text-slate-800 leading-none tracking-tight">--</h3>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded border border-slate-200 shadow-sm flex items-center gap-4">
                            <div class="p-3 bg-emerald-50 text-emerald-600 rounded">
                                <i data-lucide="test-tube-diagonal" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Chemical</p>
                                <h3 id="chemCount" class="text-2xl font-bold text-slate-800 leading-none tracking-tight">--</h3>
                            </div>
                        </div>
                    </div>

                    <!-- BAGIAN BARU: GRAFIK PENGAMBILAN + PIE CHART -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                        <!-- Grafik Pengambilan -->
                        <div class="bg-white rounded border border-slate-200 shadow-sm p-5">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-2">
                                <h4 class="font-bold text-slate-700 text-sm uppercase tracking-wider">Grafik Pengambilan (Liter)</h4>
                                <div class="flex gap-1.5">
                                    <button onclick="updateWithdrawalFilter('weekly')" class="filter-btn text-xs px-3 py-1 rounded border border-slate-300 hover:bg-slate-100 transition bg-blue-500 text-white" data-filter="weekly">Mingguan</button>
                                    <button onclick="updateWithdrawalFilter('monthly')" class="filter-btn text-xs px-3 py-1 rounded border border-slate-300 hover:bg-slate-100 transition" data-filter="monthly">Bulanan</button>
                                    <button onclick="updateWithdrawalFilter('yearly')" class="filter-btn text-xs px-3 py-1 rounded border border-slate-300 hover:bg-slate-100 transition" data-filter="yearly">Tahunan</button>
                                </div>
                            </div>
                            <canvas id="withdrawalChart" height="250"></canvas>
                        </div>

                        <!-- Pie Chart Stok Keseluruhan -->
                        <div class="bg-white rounded border border-slate-200 shadow-sm p-5">
                            <h4 class="font-bold text-slate-700 text-sm uppercase tracking-wider mb-4">Total Stok Keseluruhan (Liter)</h4>
                            <div class="flex justify-center">
                                <canvas id="overallStockPie" height="250" style="max-width: 250px;"></canvas>
                            </div>
                            <div class="text-center mt-4">
                                <p class="text-sm font-semibold text-slate-600">
                                    <span id="pieTotalCurrent">0</span> Liter tersedia dari 
                                    <span id="pieTotalMax">0</span> Liter kapasitas maksimum
                                </p>
                                <p id="pieStatus" class="text-xs text-slate-500 mt-1"></p>
                            </div>
                        </div>
                    </div>

                    <!-- LOG AKTIVITAS TERBARU (DIPERBARUI DINAMIS) -->
                    <div class="bg-white rounded border border-slate-200 shadow-sm overflow-hidden">
                        <div class="bg-slate-50 p-4 border-b border-slate-200">
                            <h4 class="font-bold text-slate-700 text-[11px] uppercase tracking-widest flex items-center gap-2">
                                <span class="w-1 h-4 bg-blue-600 rounded-full"></span> Aktivitas Terakhir
                            </h4>
                        </div>
                        <div id="recentActivity" class="p-5 text-sm text-slate-600 space-y-3">
                            <!-- akan diisi oleh JavaScript -->
                        </div>
                    </div>
                </section>

                <!-- SECTION LAIN TETAP -->
                <section id="inventory-section" class="hidden animate-in fade-in">
                    <div id="inventoryContainer" class="bg-white border border-slate-200 rounded shadow-sm overflow-x-auto min-h-[400px]">
                    </div>
                </section>

                <section id="stock-section" class="hidden animate-in fade-in">
                    <div id="stockSummaryContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    </div>
                </section>

                <section id="master-section" class="hidden animate-in fade-in">
                    <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-6">
                        <div class="relative w-full md:w-96">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchMaster" placeholder="Cari nama produk atau part number..." class="w-full bg-white border border-slate-200 rounded-lg py-2 pl-10 pr-4 text-xs focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <button onclick="openModalAdd()" class="w-full md:w-auto bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center justify-center gap-2 hover:bg-blue-700 transition-all">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah Material
                        </button>
                    </div>
                    <div id="masterContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    </div>
                </section>

                <section id="update-section" class="hidden animate-in fade-in">
                    <div id="formPlaceholder" class="max-w-xl mx-auto"></div>
                </section>

            </main>
        </div>
    </div>

    <!-- Scripts eksternal yang sudah ada (asumsikan mendefinisikan inventoryData & catChemicalMaster) -->
    <script src="master.js"></script>
    <script src="inventory.js"></script>
    <script src="stock.js"></script>
    <script src="dashboard.js"></script>

    <script>
        // Inisialisasi Lucide Icons
        lucide.createIcons();

        // ---------- SIDEBAR LOGIC ----------
        const sidebar = document.getElementById('sidebar');
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const closeBtn = document.getElementById('closeSidebar');

        mobileBtn.onclick = () => sidebar.classList.remove('-translate-x-full');
        closeBtn.onclick = () => sidebar.classList.add('-translate-x-full');

        // ---------- NAVIGASI SPA (MODIFIKASI DENGAN TRIGGER CHART) ----------
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id + '-section');
            if(target) target.classList.remove('hidden');

            // Update Sidebar highlight
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-sm', 'active-link');
                btn.classList.add('text-slate-400');
            });
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('bg-blue-600', 'text-white', 'shadow-sm', 'active-link');
                event.currentTarget.classList.remove('text-slate-400');
            }

            // Breadcrumb & title
            const titles = {
                'dashboard': 'Ringkasan Gudang',
                'inventory': 'Histori Transaksi',
                'stock': 'Saldo Stok Material',
                'master': 'Database Cat & Chemical',
                'update': 'Form In / Out'
            };
            document.getElementById('sectionTitle').innerText = titles[id] || 'Warehouse';
            document.getElementById('breadcrumb').innerText = id.charAt(0).toUpperCase() + id.slice(1);

            if (window.innerWidth < 768) sidebar.classList.add('-translate-x-full');

            // Panggil render khusus tiap section
            if (id === 'dashboard') {
                // Pastikan render chart setelah data siap
                if (typeof renderDashboardCharts === 'function') {
                    // Jika data belum ada, coba tunggu sebentar
                    if (window.inventoryData && window.catChemicalMaster) {
                        renderDashboardCharts();
                    } else {
                        setTimeout(() => {
                            if (window.inventoryData && window.catChemicalMaster) renderDashboardCharts();
                        }, 200);
                    }
                }
            }
            if(id === 'master' && typeof renderManageMaster === 'function') {
                renderManageMaster(catChemicalMaster);
            }
            if(id === 'inventory' && typeof renderInventoryTable === 'function') {
                renderInventoryTable(inventoryData);
            }
            if(id === 'stock' && typeof renderStockSummary === 'function') {
                renderStockSummary(inventoryData);
            }
        }

        // ---------- CHART HANDLER ----------
        let withdrawalChartInstance = null;
        let pieChartInstance = null;
        let currentFilter = 'weekly';

        // Fungsi agregasi transaksi keluar (pengambilan)
        function aggregateWithdrawals(transactions, period) {
            const outTransactions = transactions.filter(t => t.type === 'out' || t.jenis === 'keluar');
            const aggregated = {};

            outTransactions.forEach(t => {
                const date = new Date(t.date);
                if (isNaN(date.getTime())) return;
                let key = '';
                if (period === 'weekly') {
                    // ISO week: dapatkan Senin pekan tersebut
                    const day = date.getDay();
                    const diff = date.getDate() - day + (day === 0 ? -6 : 1); // adjust for Sunday
                    const monday = new Date(date.setDate(diff));
                    key = monday.toISOString().split('T')[0];
                } else if (period === 'monthly') {
                    key = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
                } else if (period === 'yearly') {
                    key = date.getFullYear().toString();
                }
                aggregated[key] = (aggregated[key] || 0) + (t.quantity || 0);
            });

            // Ubah ke array dan urutkan
            let entries = Object.entries(aggregated).map(([label, total]) => ({ label, total }));
            entries.sort((a, b) => a.label.localeCompare(b.label));
            return entries;
        }

        function renderWithdrawalChart(filter = currentFilter) {
            const canvas = document.getElementById('withdrawalChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            const transactions = window.inventoryData || [];
            const dataPoints = aggregateWithdrawals(transactions, filter);

            const labels = dataPoints.map(d => d.label);
            const totals = dataPoints.map(d => d.total);

            // Hancurkan chart lama jika ada
            if (withdrawalChartInstance) {
                withdrawalChartInstance.destroy();
            }

            withdrawalChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Pengambilan (Liter)',
                        data: totals,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#1e40af',
                        pointBorderColor: '#fff',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.parsed.y} Liter`
                            }
                        },
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Liter'
                            },
                            ticks: {
                                callback: (val) => val + ' L'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: filter === 'weekly' ? 'Minggu Mulai' : (filter === 'monthly' ? 'Bulan' : 'Tahun')
                            }
                        }
                    }
                }
            });
        }

        function renderOverallStockPie() {
            const canvas = document.getElementById('overallStockPie');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            const items = window.catChemicalMaster || [];
            const totalCurrent = items.reduce((sum, item) => sum + (item.stock || 0), 0);
            const totalMax = items.reduce((sum, item) => sum + (item.maxStock || 0), 0);
            const remaining = Math.max(totalMax - totalCurrent, 0);

            document.getElementById('pieTotalCurrent').innerText = totalCurrent.toFixed(1);
            document.getElementById('pieTotalMax').innerText = totalMax.toFixed(1);
            document.getElementById('pieStatus').innerText = 
                remaining > 0 
                ? `Kapasitas tersisa ${remaining.toFixed(1)} Liter` 
                : (remaining === 0 && totalCurrent > 0 ? 'Stok melebihi kapasitas maksimum!' : 'Gudang kosong');

            if (pieChartInstance) pieChartInstance.destroy();

            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Stok Tersedia (Liter)', 'Kapasitas Tersisa (Liter)'],
                    datasets: [{
                        data: [totalCurrent, remaining],
                        backgroundColor: ['#2563eb', '#e2e8f0'],
                        borderColor: '#ffffff',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '65%',
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${ctx.parsed} Liter`
                            }
                        },
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 12 },
                                usePointStyle: true,
                            }
                        }
                    }
                }
            });
        }

        function updateActivityLog() {
            const container = document.getElementById('recentActivity');
            if (!container) return;

            const items = window.catChemicalMaster || [];
            const transactions = window.inventoryData || [];

            // 1. Pengambilan terakhir
            const lastWithdrawal = transactions
                .filter(t => t.type === 'out' || t.jenis === 'keluar')
                .sort((a, b) => new Date(b.date) - new Date(a.date))[0];

            // 2. Item kedaluwarsa (asumsikan properti 'expiredDate' atau 'kadaluarsa')
            const today = new Date();
            const expiredItems = items.filter(item => {
                const expDate = item.expiredDate || item.kadaluarsa;
                if (!expDate) return false;
                return new Date(expDate) < today && item.stock > 0;
            });

            // 3. Stok menipis (≤ 10% dari maxStock)
            const lowStockItems = items.filter(item => {
                if (!item.maxStock || item.maxStock === 0) return false;
                return item.stock <= 0.1 * item.maxStock && item.stock > 0;
            });

            let html = '';

            // Kartu pengambilan terakhir
            if (lastWithdrawal) {
                const itemName = lastWithdrawal.itemName || lastWithdrawal.nama || 'Item';
                const qty = lastWithdrawal.quantity || 0;
                const dateStr = new Date(lastWithdrawal.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                html += `
                <div class="flex items-start gap-3 pb-3 border-b border-slate-100">
                    <div class="p-2 bg-blue-50 rounded text-blue-600">
                        <i data-lucide="arrow-down-circle" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-slate-700">Pengambilan Terakhir</p>
                        <p class="text-slate-600">${itemName} – <span class="font-medium">${qty} Liter</span> pada ${dateStr}</p>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="flex items-start gap-3 pb-3 border-b border-slate-100">
                    <div class="p-2 bg-blue-50 rounded text-blue-600">
                        <i data-lucide="arrow-down-circle" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-slate-700">Pengambilan Terakhir</p>
                        <p class="text-slate-500 italic">Belum ada transaksi keluar.</p>
                    </div>
                </div>`;
            }

            // Kedaluwarsa
            if (expiredItems.length > 0) {
                const list = expiredItems.map(i => {
                    const exp = i.expiredDate || i.kadaluarsa;
                    const expDate = new Date(exp).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    return `<li>${i.nama || i.itemName} – kedaluwarsa ${expDate} (Stok: ${i.stock} Liter)</li>`;
                }).join('');
                html += `
                <div class="flex items-start gap-3 pb-3 border-b border-slate-100">
                    <div class="p-2 bg-red-50 rounded text-red-500">
                        <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-red-700">Cat Kedaluwarsa</p>
                        <ul class="list-disc ml-4 text-red-600">${list}</ul>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="flex items-start gap-3 pb-3 border-b border-slate-100">
                    <div class="p-2 bg-green-50 rounded text-green-600">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-slate-700">Tidak Ada Cat Kedaluwarsa</p>
                        <p class="text-slate-500">Semua stok masih dalam masa berlaku.</p>
                    </div>
                </div>`;
            }

            // Stok menipis
            if (lowStockItems.length > 0) {
                const list = lowStockItems.map(i => {
                    const percent = ((i.stock / i.maxStock) * 100).toFixed(1);
                    return `<li>${i.nama || i.itemName} – ${i.stock} / ${i.maxStock} Liter (${percent}%)</li>`;
                }).join('');
                html += `
                <div class="flex items-start gap-3">
                    <div class="p-2 bg-amber-50 rounded text-amber-600">
                        <i data-lucide="flame" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-amber-700">Stok Menipis (&lt;10%)</p>
                        <ul class="list-disc ml-4 text-amber-600">${list}</ul>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="flex items-start gap-3">
                    <div class="p-2 bg-green-50 rounded text-green-600">
                        <i data-lucide="thumbs-up" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <p class="font-semibold text-slate-700">Stok Aman</p>
                        <p class="text-slate-500">Semua item di atas ambang batas.</p>
                    </div>
                </div>`;
            }

            container.innerHTML = html;
            // Re-inisialisasi ikon di dalam log
            lucide.createIcons({ attrs: { class: ['w-4', 'h-4'] } });
        }

        // Fungsi utama render dashboard charts & log
        function renderDashboardCharts() {
            renderWithdrawalChart(currentFilter);
            renderOverallStockPie();
            updateActivityLog();
        }

        // Filter button global
        window.updateWithdrawalFilter = function(period) {
            currentFilter = period;
            // Update style tombol
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === period) {
                    btn.classList.add('bg-blue-500', 'text-white');
                } else {
                    btn.classList.remove('bg-blue-500', 'text-white');
                }
            });
            renderWithdrawalChart(period);
        };

        // Inisialisasi pertama setelah halaman selesai dimuat (pastikan data ada)
        window.addEventListener('load', function() {
            // Coba render dashboard jika data sudah tersedia
            if (window.inventoryData && window.catChemicalMaster) {
                renderDashboardCharts();
            } else {
                // Jika data dimuat asynchronous, pantau kemunculan properti
                const checkData = setInterval(() => {
                    if (window.inventoryData && window.catChemicalMaster) {
                        clearInterval(checkData);
                        renderDashboardCharts();
                    }
                }, 300);
            }
        });

        // Override fungsi logout sederhana
        function logout() {
            Swal.fire({
                title: 'Keluar?',
                text: 'Anda akan keluar dari sistem.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya, keluar',
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.reload(); // simulasi logout
                }
            });
        }
    </script>
</body>
</html>
